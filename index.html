<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONSTRUCTION PHOTO RECORD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700;900&display=swap');

    * {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background-color: #f1f5f9;
      margin: 0;
      padding: 0;
      color: #001f3f;
    }

    .a4-page {
      width: 210mm;
      height: 297mm;
      margin: 20px auto;
      background: white;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 12mm 14mm;
      page-break-after: always;
      break-after: page;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    .cover-page {
      padding: 14mm 16mm;
    }

    .cover-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .cover-footer {
      flex-shrink: 0;
    }

    .hero-title-container {
      margin-bottom: 8mm;
      flex-shrink: 0;
    }

    .highlight-box {
      background-color: #f8fafc;
      border-left: 10px solid #001f3f;
      padding: 18px 22px 16px;
      position: relative;
    }

    .tracking-luxury {
      letter-spacing: 1.2em;
      text-indent: 1.2em;
    }

    .photo-page-header {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 3px solid #001f3f;
      padding-bottom: 10px;
      margin-bottom: 10px;
      min-height: 18mm;
    }

    .photo-page-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .ledger-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 8mm 8mm;
    }

    .photo-card {
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .photo-frame {
      flex: 1;
      min-height: 0;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .photo-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-meta {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid #f1f5f9;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.12em;
      gap: 10px;
    }

    .photo-meta-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .photo-meta-left input {
      min-width: 0;
    }

    .photo-caption {
      flex-shrink: 0;
      margin-top: 8px;
      height: 4.5em;
      font-size: 12px;
      line-height: 1.5;
      font-weight: 700;
      color: #475569;
      overflow: hidden;
    }

    .photo-page-footer {
      flex-shrink: 0;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9px;
      color: #9ca3af;
      letter-spacing: 0.25em;
      font-weight: 900;
      text-transform: uppercase;
      min-height: 12mm;
    }

    textarea, input {
      border: none;
      outline: none;
      background: transparent;
      resize: none;
      width: 100%;
      font: inherit;
      color: inherit;
    }

    textarea::placeholder, input::placeholder {
      color: #cbd5e1;
    }

    .mobile-shell {
      display: none;
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 0;
      }

      html, body {
        width: 210mm;
        height: auto;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
      }

      .a4-page {
        width: 210mm;
        height: 297mm;
        margin: 0 !important;
        box-shadow: none !important;
        page-break-after: always;
        break-after: page;
      }

      .no-print {
        display: none !important;
      }

      .mobile-shell {
        display: none !important;
      }

      .desktop-shell {
        display: block !important;
      }
    }

    @media (max-width: 900px) {
      .desktop-shell {
        display: none;
      }

      .mobile-shell {
        display: block;
      }
    }
  </style>

  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="写真台帳" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="manifest.json" />
  <style>
    .install-banner {
      position: sticky;
      top: 0;
      z-index: 60;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .install-banner button {
      border: none;
      border-radius: 9999px;
      background: white;
      color: #0f172a;
      font-weight: 800;
      padding: 8px 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .install-note {
      font-size: 11px;
      color: #cbd5e1;
      margin-top: 4px;
      line-height: 1.4;
      letter-spacing: 0;
      font-weight: 500;
    }
  </style>

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const STORAGE_KEY = "signboard-photo-ledger-v1";

    const defaultProject = {
      title: "",
      location: "愛知県名古屋市",
      period: "2026.04.01 - 2026.04.10",
      contractor: "株式会社 林看板",
      representative: "林 孝行",
      serial: "ID: 2026-000"
    };

    const createPhotoSet = () => ([
      { id: 1, src: null, status: "before", statusJp: "着工前全景", caption: "現場の現状確認。", photoId: "01" },
      { id: 2, src: null, status: "during", statusJp: "施工中", caption: "", photoId: "02" },
      { id: 3, src: null, status: "during", statusJp: "施工中", caption: "", photoId: "03" },
      { id: 4, src: null, status: "after", statusJp: "完了", caption: "", photoId: "04" }
    ]);

    const createPage = () => ({
      id: `${Date.now()}-${Math.random()}`,
      photos: createPhotoSet()
    });

    const Icon = ({ name, size = 16, className = "" }) => {
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [name]);
      return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
    };

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = (event) => {
          img.src = event.target.result;
        };

        img.onerror = reject;

        img.onload = () => {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          if (!ctx) {
            reject(new Error("Canvas unavailable"));
            return;
          }

          const maxWidth = 1200;
          const scale = img.width > maxWidth ? maxWidth / img.width : 1;

          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);

          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          resolve(canvas.toDataURL("image/jpeg", 0.72));
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function App() {
      const loadInitialState = () => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.project || !Array.isArray(parsed.pages) || !parsed.pages.length) return null;
          return parsed;
        } catch {
          return null;
        }
      };

      const initial = loadInitialState();
      const [project, setProject] = useState(initial?.project || defaultProject);
      const [pages, setPages] = useState(initial?.pages || [createPage()]);
      const [activePageIndex, setActivePageIndex] = useState(0);
      const [installPromptEvent, setInstallPromptEvent] = useState(null);
      const [showIosGuide, setShowIosGuide] = useState(false);
      const importRef = useRef(null);

      const totalPhotos = useMemo(() => pages.reduce((s, p) => s + p.photos.length, 0), [pages]);
      const activePage = pages[activePageIndex] || pages[0];

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ project, pages }));
        } catch {}
      }, [project, pages]);

      useEffect(() => {
        const ua = window.navigator.userAgent.toLowerCase();
        const isiPhone = /iphone|ipad|ipod/.test(ua);
        const isInStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isiPhone && !isInStandalone) setShowIosGuide(true);

        const handleBeforeInstallPrompt = (e) => {
          e.preventDefault();
          setInstallPromptEvent(e);
        };

        window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js').catch(() => {});
          });
        }

        return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
      }, []);

      const handleInstall = async () => {
        if (!installPromptEvent) return;
        installPromptEvent.prompt();
        try {
          await installPromptEvent.userChoice;
        } catch {}
        setInstallPromptEvent(null);
      };

      const resetAllData = () => {
        if (!window.confirm('保存済みの案件情報と写真台帳データを端末から削除します。よろしいですか？')) return;
        localStorage.removeItem(STORAGE_KEY);
        setProject(defaultProject);
        setPages([createPage()]);
        setActivePageIndex(0);
      };

      const updateProjectField = (field, value) => {
        setProject((prev) => ({ ...prev, [field]: value }));
      };

      const statusMapJaToEn = {
        "": "",
        "着工前": "before",
        "着工前全景": "before",
        "施工前": "before",
        "取付前": "before",
        "施工中": "during",
        "取付中": "during",
        "撤去中": "during",
        "完了": "after",
        "完成": "after",
        "撤去後": "after",
        "取付後": "after"
      };

      const statusMapEnToJa = {
        "": "",
        "before": "着工前",
        "during": "施工中",
        "after": "完了"
      };

      const updatePhoto = (pageId, photoId, field, value) => {
        setPages((prev) =>
          prev.map((page) =>
            page.id === pageId
              ? {
                  ...page,
                  photos: page.photos.map((photo) => {
                    if (photo.id !== photoId) return photo;

                    if (field === "status") {
                      const normalized = String(value).trim().toLowerCase();
                      return {
                        ...photo,
                        status: normalized,
                        statusJp: statusMapEnToJa[normalized] || photo.statusJp
                      };
                    }

                    if (field === "statusJp") {
                      const normalized = String(value).trim();
                      return {
                        ...photo,
                        statusJp: normalized,
                        status: statusMapJaToEn[normalized] || photo.status
                      };
                    }

                    return { ...photo, [field]: value };
                  })
                }
              : page
          )
        );
      };

      const uploadPhoto = async (pageId, photoId, e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        try {
          const compressed = await compressImage(file);
          updatePhoto(pageId, photoId, "src", compressed);
        } catch (err) {
          alert("画像の読み込みに失敗しました。");
        }
        e.target.value = "";
      };

      const addPage = () => {
        setPages((prev) => {
          const next = [...prev, createPage(project.title)];
          setActivePageIndex(next.length - 1);
          return next;
        });
      };

      const removePage = (pageId) => {
        setPages((prev) => {
          if (prev.length <= 1) return prev;
          const next = prev.filter((p) => p.id !== pageId);
          setActivePageIndex((idx) => Math.min(idx, next.length - 1));
          return next;
        });
      };

      const handlePrint = () => window.print();

      const exportJson = () => {
        const payload = { project, pages };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const safeTitle = (project.title || "construction-photo-record").replace(/[\\/:*?"<>|]/g, "_");
        a.href = url;
        a.download = `${safeTitle}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      };

      const importJson = (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(String(event.target.result || "{}"));
            if (!parsed.project || !parsed.pages) throw new Error();
            setProject(parsed.project);
            setPages(parsed.pages.length ? parsed.pages : [createPage(parsed.project.title || "")]);
            setActivePageIndex(0);
          } catch {
            alert("読込に失敗しました。");
          }
        };
        reader.readAsText(file, "utf-8");
        e.target.value = "";
      };

      return (
        <div>
          {(installPromptEvent || showIosGuide) && (
            <div className="install-banner no-print">
              <div>
                <div>写真台帳システムをホーム画面に追加できます</div>
                <div className="install-note">
                  {installPromptEvent
                    ? 'Androidは「追加」ボタンでインストールできます。'
                    : 'iPhoneはSafariの共有ボタンから「ホーム画面に追加」を選択してください。'}
                </div>
              </div>
              {installPromptEvent ? (
                <button onClick={handleInstall}>追加</button>
              ) : (
                <button onClick={() => setShowIosGuide(false)}>閉じる</button>
              )}
            </div>
          )}
          <div className="desktop-shell">
            <div className="no-print p-4 max-w-xl mx-auto">
              <div className="bg-white p-4 rounded-xl shadow mb-4 space-y-3">
                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">案件名</div>
                  <textarea
                    placeholder="案件名"
                    value={project.title}
                    onChange={(e) => updateProjectField("title", e.target.value)}
                    className="w-full border p-3 rounded"
                    rows="3"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">施工場所 / 現場住所</div>
                  <input
                    value={project.location}
                    onChange={(e) => updateProjectField("location", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">工期</div>
                  <input
                    value={project.period}
                    onChange={(e) => updateProjectField("period", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">施工業者</div>
                  <input
                    value={project.contractor}
                    onChange={(e) => updateProjectField("contractor", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">担当者名</div>
                  <input
                    value={project.representative}
                    onChange={(e) => updateProjectField("representative", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">文書ID</div>
                  <input
                    value={project.serial}
                    onChange={(e) => updateProjectField("serial", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>
              </div>

              <div className="grid grid-cols-2 gap-3">
                {pages[0].photos.map((p) => (
                  <div key={p.id} className="bg-white p-3 rounded shadow">
                    <div className="aspect-[4/3] bg-gray-100 mb-2 overflow-hidden">
                      {p.src && <img src={p.src} className="w-full h-full object-cover" />}
                    </div>

                    <label className="block bg-[#001f3f] text-white text-center py-2 rounded cursor-pointer text-sm mb-2">
                      写真選択
                      <input type="file" accept="image/*" onChange={(e) => uploadPhoto(pages[0].id, p.id, e)} className="hidden" />
                    </label>

                    <textarea
                      value={p.caption}
                      onChange={(e) => updatePhoto(pages[0].id, p.id, "caption", e.target.value)}
                      className="w-full border rounded p-2 text-sm"
                      rows="2"
                    />
                  </div>
                ))}
              </div>

              <div className="mt-4 text-xs text-slate-500 leading-5">このPWA版は入力内容を端末に自動保存します。URL公開後はiPhone / Androidでホーム画面追加して使えます。</div>
              <div className="grid grid-cols-3 gap-2 mt-4">
                <button onClick={exportJson} className="w-full bg-slate-700 text-white py-3 rounded">JSON保存</button>
                <button onClick={() => document.getElementById("json-import-global")?.click()} className="w-full bg-slate-200 text-slate-800 py-3 rounded">JSON読込</button>
                <button onClick={resetAllData} className="w-full bg-rose-100 text-rose-700 py-3 rounded">初期化</button>
              </div>
              <input id="json-import-global" ref={importRef} type="file" accept=".json,application/json" className="hidden" onChange={importJson} />
              <button onClick={handlePrint} className="mt-4 w-full bg-blue-600 text-white py-3 rounded">
                PDF出力
              </button>
            </div>

            <div className="a4-page cover-page">
              <div className="flex justify-between items-start min-h-[20mm] shrink-0">
                <div className="bg-slate-50 text-slate-400 px-4 py-2 border border-slate-100 text-[9px] font-black tracking-[0.3em] uppercase italic">
                  Confidential / 機密
                </div>

                <div className="text-right border-r-[6px] border-[#001f3f] pr-5">
                  <span className="text-zinc-300 block text-[8px] mb-1 font-black tracking-widest">
                    DOCUMENT ID
                  </span>
                  <div className="text-right font-black text-[#001f3f] text-[12px] w-32">{project.serial}</div>
                </div>
              </div>

              <div className="cover-main">
                <div className="text-center mb-12 shrink-0">
                  <h2 className="text-[13px] font-black text-zinc-300 uppercase tracking-luxury leading-none mb-6">
                    CONSTRUCTION PHOTO RECORD
                  </h2>
                  <div className="h-[1.5px] w-48 bg-zinc-100 mx-auto"></div>
                </div>

                <div className="hero-title-container">
                  <div className="highlight-box shadow-sm">
                    <div className="absolute -top-4 left-10 bg-blue-900 text-white px-5 py-1 text-[9px] font-black tracking-[0.35em] uppercase shadow-sm">
                      Project Name / 工事名称
                    </div>

                    <div className="text-4xl font-black tracking-tighter leading-tight text-[#001f3f] w-full whitespace-pre-wrap break-words">
                      {project.title || "案件名を入力"}
                    </div>
                  </div>
                </div>

                <div className="max-w-lg mx-auto w-full space-y-6 mt-8">
                  {[
                    { label: "施工場所 / Site Location", key: "location", val: project.location },
                    { label: "工期 / Work Period", key: "period", val: project.period },
                    { label: "施工業者 / Contractor", key: "contractor", val: project.contractor },
                    { label: "担当者 / Representative", key: "representative", val: project.representative },
                  ].map((item) => (
                    <div key={item.key} className="flex border-b-2 border-zinc-50 pb-3 items-end">
                      <div className="flex items-center gap-4 w-52 shrink-0">
                        <label className="text-[9px] uppercase tracking-widest font-black text-zinc-400 leading-none">
                          {item.label}
                        </label>
                      </div>
                      <div className="flex-1 text-[16px] font-bold text-[#001f3f] tracking-wide whitespace-pre-wrap">
                        {item.val}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="cover-footer h-[22mm] flex flex-col items-center justify-end">
                <div className="h-10 w-[1px] bg-[#001f3f] opacity-10 mb-4"></div>
                <p className="text-[10px] text-zinc-200 tracking-[1.2em] font-black uppercase italic ml-[1.2em]">
                  Official Record
                </p>
              </div>
            </div>

            {pages.map((page, pIdx) => (
              <div key={page.id} className="a4-page">
                <div className="photo-page-header">
                  <div className="flex items-center gap-5 min-w-0">
                    <h3 className="text-2xl font-black italic uppercase tracking-tighter text-[#001f3f] shrink-0">
                      Photo Log
                    </h3>
                    <div className="h-6 w-[1px] bg-zinc-200 shrink-0"></div>
                    <p className="text-[10px] text-blue-800 tracking-[0.25em] font-black uppercase truncate max-w-[350px]">
                      {project.title?.trim() || "Archive Record"}
                    </p>
                  </div>

                  <div className="bg-[#001f3f] text-white text-[11px] font-black px-6 py-2 uppercase tracking-[0.35em] shadow-sm shrink-0">
                    Page {pIdx + 1}
                  </div>
                </div>

                <div className="photo-page-content">
                  <div className="ledger-grid">
                    {page.photos.map((photo) => (
                      <div key={photo.id} className="photo-card">
                        <div className="photo-frame group shadow-sm bg-slate-50">
                          <div className="w-full h-full flex items-center justify-center relative">
                            {photo.src ? (
                              <img src={photo.src} className="photo-image" />
                            ) : (
                              <div className="flex flex-col items-center gap-3 opacity-10">
                                <span className="text-[9px] tracking-[0.5em] font-black uppercase italic">Pending</span>
                              </div>
                            )}
                          </div>
                        </div>

                        <div className="photo-meta">
                          <div className="photo-meta-left">
                            <div className="text-blue-800 uppercase font-black w-[75px]">{photo.status}</div>
                            <span className="text-zinc-200">/</span>
                            <div className="text-[#001f3f] font-bold flex-1">{photo.statusJp}</div>
                          </div>

                          <div className="text-right text-zinc-300 w-[72px] italic font-medium shrink-0">
                            {photo.photoId}
                          </div>
                        </div>

                        <div className="photo-caption whitespace-pre-wrap">{photo.caption || " "}</div>
                      </div>
                    ))}
                  </div>

                  <div className="photo-page-footer">
                    <div className="flex items-center gap-4 italic min-w-0">
                      <span className="text-[#001f3f] font-black tracking-tight uppercase shrink-0">
                        Authorized Official
                      </span>
                      <div className="h-3 w-[1px] bg-zinc-200 shrink-0"></div>
                      <span className="truncate">{project.contractor}</span>
                    </div>

                    <div className="flex items-center gap-4 italic shrink-0">
                      <span>{project.serial}</span>
                      <div className="w-1.5 h-1.5 bg-zinc-200 rounded-full"></div>
                      
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div className="mobile-shell">
            <div className="min-h-screen bg-slate-100 text-slate-900 pb-28">
              <div className="sticky top-0 z-40 bg-slate-950 text-white px-4 py-3 shadow-lg">
                <div className="flex items-center justify-between gap-3">
                  <div className="min-w-0">
                    <div className="text-[13px] font-black uppercase tracking-[0.16em] truncate">Construction Photo Record</div>
                    <div className="text-[10px] text-sky-300 font-semibold tracking-[0.14em] uppercase">same pc layout output</div>
                  </div>
                  <button onClick={handlePrint} className="shrink-0 rounded-2xl bg-sky-600 px-4 py-2 text-sm font-bold">
                    印刷
                  </button>
                </div>
                <div className="mt-3 flex gap-2 text-xs">
                  <div className="bg-white/10 rounded-full px-3 py-1">{pages.length} ページ</div>
                  <div className="bg-white/10 rounded-full px-3 py-1">{totalPhotos} 写真枠</div>
                </div>
              </div>

              <div className="px-3 py-3 space-y-3">
                <div className="rounded-3xl bg-white p-4 shadow-sm">
                  <h2 className="text-xl font-black tracking-tight mb-3">案件情報</h2>
                  <div className="space-y-4">
                    {[
                      ["工事名称", "title", true],
                      ["施工場所", "location", false],
                      ["工期", "period", false],
                      ["施工業者", "contractor", false],
                      ["担当者", "representative", false],
                      ["文書ID", "serial", false]
                    ].map(([label, key, multi]) => (
                      <div key={key} className="border-b border-slate-200 pb-3">
                        <label className="block text-[11px] font-bold tracking-[0.14em] text-slate-500 uppercase mb-2">{label}</label>
                        {multi ? (
                          <textarea
                            value={project[key]}
                            onChange={(e) => updateProjectField(key, e.target.value)}
                            rows="4"
                            className="text-[16px] font-semibold leading-6"
                          />
                        ) : (
                          <input
                            value={project[key]}
                            onChange={(e) => updateProjectField(key, e.target.value)}
                            className="text-[16px] font-semibold h-8"
                          />
                        )}
                      </div>
                    ))}
                  </div>
                </div>

                <div className="rounded-3xl bg-white p-4 shadow-sm">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-lg font-black tracking-tight">ページ管理</h2>
                    <div className="text-sm text-slate-500">{pages.length}ページ</div>
                  </div>

                  <div className="flex flex-wrap gap-2 mb-4">
                    {pages.map((page, idx) => (
                      <button
                        key={page.id}
                        onClick={() => setActivePageIndex(idx)}
                        className={`rounded-xl px-3 py-2 text-sm font-bold ${idx === activePageIndex ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-700"}`}
                      >
                        Page {idx + 1}
                      </button>
                    ))}
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <button onClick={addPage} className="rounded-2xl bg-slate-900 text-white px-4 py-3 font-bold">追加</button>
                    <button onClick={() => removePage(activePage.id)} className="rounded-2xl bg-rose-50 text-rose-600 px-4 py-3 font-bold">削除</button>
                  </div>
                </div>

                <div className="rounded-3xl bg-white p-4 shadow-sm">
                  <div className="flex items-center justify-between mb-3">
                    <h2 className="text-lg font-black tracking-tight">台帳編集</h2>
                    <button onClick={exportJson} className="rounded-xl bg-slate-100 px-3 py-2 text-sm font-bold text-slate-700">保存</button>
                  </div>
                  <button onClick={() => document.getElementById("json-import-global")?.click()} className="w-full mb-3 rounded-xl bg-slate-100 px-3 py-3 text-sm font-bold text-slate-700">読込</button>
                  <button onClick={resetAllData} className="w-full mb-3 rounded-xl bg-rose-50 px-3 py-3 text-sm font-bold text-rose-600">端末保存データを初期化</button>
                  
                  <div className="grid grid-cols-2 gap-3">
                    {activePage.photos.map((photo) => (
                      <div key={photo.id} className="min-w-0">
                        <div className="aspect-[4/3] rounded border border-slate-200 bg-slate-50 overflow-hidden relative">
                          {photo.src ? (
                            <img src={photo.src} alt="" className="w-full h-full object-cover block" />
                          ) : (
                            <div className="w-full h-full flex items-center justify-center text-slate-300 text-[10px] font-bold uppercase tracking-[0.14em]">
                              No Image
                            </div>
                          )}
                        </div>

                        <label className="mt-2 flex items-center justify-center rounded-xl bg-slate-900 text-white px-3 py-2 text-[11px] font-bold cursor-pointer">
                          画像をアップロード
                          <input type="file" accept="image/*" className="hidden" onChange={(e) => uploadPhoto(activePage.id, photo.id, e)} />
                        </label>

                        <div className="mt-2 space-y-1">
                          <select
                            value={photo.status}
                            onChange={(e) => updatePhoto(activePage.id, photo.id, "status", e.target.value)}
                            className="rounded-lg bg-slate-50 px-2 py-2 text-[10px] font-black text-sky-800 uppercase border border-slate-200"
                          >
                            <option value=""></option>
                            <option value="before">BEFORE</option>
                            <option value="during">DURING</option>
                            <option value="after">AFTER</option>
                          </select>

                          <select
                            value={photo.statusJp}
                            onChange={(e) => updatePhoto(activePage.id, photo.id, "statusJp", e.target.value)}
                            className="rounded-lg bg-slate-50 px-2 py-2 text-[11px] font-bold text-[#001f3f] border border-slate-200"
                          >
                            <option value=""></option>
                            <option value="着工前">着工前</option>
                            <option value="施工中">施工中</option>
                            <option value="完了">完了</option>
                          </select>

                          <input
                            value={photo.photoId}
                            onChange={(e) => updatePhoto(activePage.id, photo.id, "photoId", e.target.value)}
                            className="rounded-lg bg-slate-50 px-2 py-2 text-[10px] italic text-slate-500 border border-slate-200"
                          />

                          <textarea
                            value={photo.caption}
                            onChange={(e) => updatePhoto(activePage.id, photo.id, "caption", e.target.value)}
                            placeholder="詳細説明を記入してください"
                            rows="4"
                            className="rounded-lg bg-slate-50 px-2 py-2 text-[10px] leading-4 text-slate-600 border border-slate-200"
                          />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="rounded-3xl bg-white p-4 shadow-sm">
                  <h2 className="text-lg font-black tracking-tight mb-3">ホーム画面追加の案内</h2>
                  <div className="text-sm text-slate-600 leading-6">iPhoneはSafariの共有ボタンから「ホーム画面に追加」、AndroidはChrome右上メニューから「ホーム画面に追加」を選択してください。</div>
                </div>

                <div className="rounded-3xl bg-white p-4 shadow-sm">
                  <h2 className="text-lg font-black tracking-tight mb-3">スマホ確認用プレビュー</h2>
                  <p className="text-xs text-slate-500 mb-3">スマホでは軽量表示、印刷/PDFではPC版と同じレイアウトを使います。</p>
                  <div className="rounded-3xl border border-slate-200 bg-white p-4">
                    <div className="text-[10px] font-black tracking-[0.25em] uppercase text-slate-300 mb-4">CONSTRUCTION PHOTO RECORD</div>
                    <div className="border-l-4 border-[#001f3f] bg-slate-50 px-4 py-3 mb-4">
                      <div className="text-[10px] font-black uppercase tracking-[0.16em] text-slate-500 mb-2">Project Name / 工事名称</div>
                      <div className="text-xl font-black text-[#001f3f] whitespace-pre-wrap break-words" style={{letterSpacing:"0.04em", lineHeight:"1.35"}}>
                        {project.title || "案件名を入力"}
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      {activePage.photos.map((photo) => (
                        <div key={photo.id} className="min-w-0">
                          <div className="aspect-[4/3] rounded border border-slate-200 bg-slate-50 overflow-hidden">
                            {photo.src ? <img src={photo.src} className="w-full h-full object-cover block" /> : null}
                          </div>
                          <div className="mt-2 text-[9px] font-black text-sky-800 uppercase truncate">{photo.status}</div>
                          <div className="text-[10px] font-bold text-[#001f3f] truncate">{photo.statusJp}</div>
                          <div className="text-[9px] italic text-slate-400 truncate">{photo.photoId}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
