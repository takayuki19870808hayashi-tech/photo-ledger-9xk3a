<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef } = React;

    const defaultProject = {
      title: "",
      location: "愛知県名古屋市",
      period: "2026.04.01 - 2026.04.10",
      contractor: "株式会社 林看板",
      representative: "林 孝行",
      serial: "ID: 2026-000"
    };

    const createPhotoSet = () => ([
      { id: 1, src: null, status: "before", statusJp: "着工前", caption: "現場の現状確認。", photoId: "01" },
      { id: 2, src: null, status: "", statusJp: "", caption: "", photoId: "02" },
      { id: 3, src: null, status: "", statusJp: "", caption: "", photoId: "03" },
      { id: 4, src: null, status: "", statusJp: "", caption: "", photoId: "04" }
    ]);

    const createPage = () => ({
      id: `${Date.now()}-${Math.random()}`,
      photos: createPhotoSet()
    });

    const statusMapJaToEn = {
      "": "",
      "無記名": "",
      "着工前": "before",
      "着工前全景": "before",
      "施工前": "before",
      "取付前": "before",
      "施工中": "during",
      "取付中": "during",
      "撤去中": "during",
      "完了": "after",
      "完成": "after",
      "撤去後": "after",
      "取付後": "after"
    };

    const statusMapEnToJa = {
      "": "",
      "before": "着工前",
      "during": "施工中",
      "after": "完了"
    };

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = (event) => {
          img.src = event.target.result;
        };

        img.onerror = reject;

        img.onload = () => {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          if (!ctx) {
            reject(new Error("Canvas unavailable"));
            return;
          }

          const maxWidth = 1600;
          const scale = img.width > maxWidth ? maxWidth / img.width : 1;

          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);

          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL("image/jpeg", 0.82));
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function App() {
      const [project, setProject] = useState(defaultProject);
      const [pages, setPages] = useState([createPage()]);
      const [activePageIndex, setActivePageIndex] = useState(0);
      const importRef = useRef(null);

      const totalPhotos = useMemo(
        () => pages.reduce((sum, page) => sum + page.photos.length, 0),
        [pages]
      );

      const activePage = pages[activePageIndex] || pages[0];

      const updateProjectField = (field, value) => {
        setProject((prev) => ({ ...prev, [field]: value }));
      };

      const updatePhoto = (pageId, photoId, field, value) => {
        setPages((prev) =>
          prev.map((page) => {
            if (page.id !== pageId) return page;

            return {
              ...page,
              photos: page.photos.map((photo) => {
                if (photo.id !== photoId) return photo;

                if (field === "status") {
                  const normalized = String(value).trim().toLowerCase();
                  return {
                    ...photo,
                    status: normalized,
                    statusJp: normalized === "" ? "" : (statusMapEnToJa[normalized] ?? photo.statusJp)
                  };
                }

                if (field === "statusJp") {
                  const normalized = String(value).trim();
                  const isBlank = normalized === "" || normalized === "無記名";
                  return {
                    ...photo,
                    statusJp: isBlank ? "" : normalized,
                    status: isBlank ? "" : (statusMapJaToEn[normalized] ?? photo.status)
                  };
                }

                return { ...photo, [field]: value };
              })
            };
          })
        );
      };

      const clearPhotoImage = (pageId, photoId) => {
        setPages((prev) =>
          prev.map((page) => {
            if (page.id !== pageId) return page;
            return {
              ...page,
              photos: page.photos.map((photo) =>
                photo.id === photoId ? { ...photo, src: null } : photo
              )
            };
          })
        );
      };

      const uploadPhoto = async (pageId, photoId, event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        try {
          const compressed = await compressImage(file);
          updatePhoto(pageId, photoId, "src", compressed);
        } catch (error) {
          alert("画像の読み込みに失敗しました。");
        }

        event.target.value = "";
      };

      const addPage = () => {
        setPages((prev) => {
          const next = [...prev, createPage()];
          setActivePageIndex(next.length - 1);
          return next;
        });
      };

      const removePage = (pageId) => {
        setPages((prev) => {
          if (prev.length <= 1) return prev;
          const next = prev.filter((page) => page.id !== pageId);
          setActivePageIndex((index) => Math.min(index, next.length - 1));
          return next;
        });
      };

      const handlePrint = () => {
        window.print();
      };

      const exportJson = () => {
        const payload = { project, pages };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {
          type: "application/json"
        });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        const safeTitle = (project.title || "construction-photo-record")
          .replace(/[\\/:*?"<>|]/g, "_");

        anchor.href = url;
        anchor.download = `${safeTitle}.json`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      };

      const importJson = (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (loadEvent) => {
          try {
            const parsed = JSON.parse(String(loadEvent.target.result || "{}"));
            if (!parsed.project || !parsed.pages) throw new Error("invalid");
            setProject(parsed.project);
            setPages(parsed.pages.length ? parsed.pages : [createPage()]);
            setActivePageIndex(0);
          } catch (error) {
            alert("読込に失敗しました。");
          }
        };

        reader.readAsText(file, "utf-8");
        event.target.value = "";
      };

      return (
        <div>
          <div className="desktop-shell">
            <div className="no-print p-4 max-w-xl mx-auto">
              <div className="bg-white p-4 rounded-xl shadow mb-4 space-y-3">
                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">案件名</div>
                  <textarea
                    placeholder="案件名"
                    value={project.title}
                    onChange={(e) => updateProjectField("title", e.target.value)}
                    className="w-full border p-3 rounded"
                    rows="3"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">施工場所 / 現場住所</div>
                  <input
                    value={project.location}
                    onChange={(e) => updateProjectField("location", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">工期</div>
                  <input
                    value={project.period}
                    onChange={(e) => updateProjectField("period", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">施工業者</div>
                  <input
                    value={project.contractor}
                    onChange={(e) => updateProjectField("contractor", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">担当者名</div>
                  <input
                    value={project.representative}
                    onChange={(e) => updateProjectField("representative", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>

                <div>
                  <div className="text-sm mb-2 font-bold text-slate-700">文書ID</div>
                  <input
                    value={project.serial}
                    onChange={(e) => updateProjectField("serial", e.target.value)}
                    className="w-full border p-3 rounded"
                  />
                </div>
              </div>

              <div className="grid grid-cols-2 gap-3">
                {pages[0].photos.map((photo) => (
                  <div key={photo.id} className="bg-white p-3 rounded shadow">
                    <div className="aspect-[4/3] bg-gray-100 mb-2 overflow-hidden">
                      {photo.src && <img src={photo.src} className="w-full h-full object-cover" alt="" />}
                    </div>

                    <div className="grid grid-cols-2 gap-2 mb-2">
                      <label className="block bg-[#001f3f] text-white text-center py-2 rounded cursor-pointer text-sm">
                        写真選択
                        <input
                          type="file"
                          accept="image/*"
                          onChange={(e) => uploadPhoto(pages[0].id, photo.id, e)}
                          className="hidden"
                        />
                      </label>
                      <button
                        type="button"
                        onClick={() => clearPhotoImage(pages[0].id, photo.id)}
                        className="bg-rose-50 text-rose-600 text-center py-2 rounded text-sm font-bold"
                      >
                        写真削除
                      </button>
                    </div>

                    <textarea
                      value={photo.caption}
                      onChange={(e) => updatePhoto(pages[0].id, photo.id, "caption", e.target.value)}
                      className="w-full border rounded p-2 text-sm"
                      rows="2"
                    />
                  </div>
                ))}
              </div>

              <button
                onClick={handlePrint}
                className="mt-4 w-full bg-blue-600 text-white py-3 rounded"
              >
                PDF出力
              </button>
            </div>

            <div className="a4-page cover-page">
              <div className="flex justify-between items-start min-h-[20mm] shrink-0">
                <div className="bg-slate-50 text-slate-400 px-4 py-2 border border-slate-100 text-[9px] font-black tracking-[0.3em] uppercase italic">
                  Confidential / 機密
                </div>

                <div className="text-right border-r-[6px] border-[#001f3f] pr-5">
                  <span className="text-zinc-300 block text-[8px] mb-1 font-black tracking-widest">
                    DOCUMENT ID
                  </span>
                  <div className="text-right font-black text-[#001f3f] text-[12px] w-32">
                    {project.serial}
                  </div>
                </div>
              </div>

              <div className="cover-main">
                <div className="text-center mb-12 shrink-0">
                  <h2 className="text-[13px] font-black text-zinc-300 uppercase tracking-luxury leading-none mb-6">
                    CONSTRUCTION PHOTO RECORD
                  </h2>
                  <div className="h-[1.5px] w-48 bg-zinc-100 mx-auto"></div>
                </div>

                <div className="hero-title-container">
                  <div className="highlight-box shadow-sm">
                    <div className="absolute -top-4 left-10 bg-blue-900 text-white px-5 py-1 text-[9px] font-black tracking-[0.35em] uppercase shadow-sm">
                      Project Name / 工事名称
                    </div>
                    <div className="cover-title-text">
                      {project.title || "案件名を入力"}
                    </div>
                  </div>
                </div>

                <div className="title-spacer"></div>

                <div className="cover-info-block">
                  {[
                    { label: "施工場所 / Site Location", key: "location", val: project.location },
                    { label: "工期 / Work Period", key: "period", val: project.period },
                    { label: "施工業者 / Contractor", key: "contractor", val: project.contractor },
                    { label: "担当者 / Representative", key: "representative", val: project.representative }
                  ].map((item) => (
                    <div key={item.key} className="cover-info-row">
                      <div className="cover-info-label">
                        {item.label}
                      </div>
                      <div className="cover-info-value">
                        {item.val}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="cover-footer h-[22mm] flex flex-col items-center justify-end">
                <div className="h-10 w-[1px] bg-[#001f3f] opacity-10 mb-4"></div>
                <p className="text-[10px] text-zinc-200 tracking-[1.2em] font-black uppercase italic ml-[1.2em]">
                  Official Record
                </p>
              </div>
            </div>

            {pages.map((page, pageIndex) => (
              <div key={page.id} className="a4-page">
                <div className="photo-page-header">
                  <div className="flex items-center gap-5 min-w-0">
                    <h3 className="text-2xl font-black italic uppercase tracking-tighter text-[#001f3f] shrink-0">
                      Photo Log
                    </h3>
                    <div className="h-6 w-[1px] bg-zinc-200 shrink-0"></div>
                    <p className="text-[10px] text-blue-800 tracking-[0.25em] font-black uppercase truncate max-w-[350px]">
                      {project.title?.trim() || "Archive Record"}
                    </p>
                  </div>

                  <div className="bg-[#001f3f] text-white text-[11px] font-black px-6 py-2 uppercase tracking-[0.35em] shadow-sm shrink-0">
                    Page {pageIndex + 1}
                  </div>
                </div>

                <div className="photo-page-content">
                  <div className="ledger-grid">
                    {page.photos.map((photo) => (
                      <div key={photo.id} className="photo-card">
                        <div className="photo-frame group shadow-sm bg-slate-50">
                          <div className="w-full h-full flex items-center justify-center relative">
                            {photo.src ? (
                              <img src={photo.src} className="photo-image" alt="" />
                            ) : (
                              <div className="flex flex-col items-center gap-3 opacity-10">
                                <span className="text-[9px] tracking-[0.5em] font-black uppercase italic">
                                  Pending
                                </span>
                              </div>
                            )}
                          </div>
                        </div>

                        <div className="photo-meta">
                          <div className="photo-meta-left">
                            <div className="text-blue-800 uppercase font-black w-[75px]">
                              {photo.status || " "}
                            </div>
                            <span className="text-zinc-200">/</span>
                            <div className="text-[#001f3f] font-bold flex-1">
                              {photo.statusJp || " "}
                            </div>
                          </div>

                          <div className="text-right text-zinc-300 w-[72px] italic font-medium shrink-0">
                            {photo.photoId}
                          </div>
                        </div>

                        <div className="photo-caption">{photo.caption || " "}</div>
                      </div>
                    ))}
                  </div>

                  <div className="photo-page-footer">
                    <div className="flex items-center gap-4 italic min-w-0">
                      <span className="text-[#001f3f] font-black tracking-tight uppercase shrink-0">
                        Authorized Official
                      </span>
                      <div className="h-3 w-[1px] bg-zinc-200 shrink-0"></div>
                      <span className="truncate">{project.contractor}</span>
                    </div>

                    <div className="flex items-center gap-4 italic shrink-0">
                      <span>{project.serial}</span>
                      <div className="w-1.5 h-1.5 bg-zinc-200 rounded-full"></div>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div className="mobile-shell">
            <div className="mobile-app">
              <div className="mobile-topbar">
                <div className="flex items-start justify-between gap-3">
                  <div className="min-w-0">
                    <h1 className="text-[13px] font-black uppercase tracking-[0.18em] leading-[1.35]">
                      Construction<br />Photo Record
                    </h1>
                    <div className="mt-2 text-[10px] text-sky-300 font-semibold tracking-[0.18em] uppercase">
                      Mobile Input Edition
                    </div>
                  </div>

                  <div className="shrink-0 flex flex-col items-end gap-2">
                    <div className="flex gap-2 text-xs">
                      <div className="bg-white/10 rounded-full px-3 py-1">{pages.length}ページ</div>
                      <div className="bg-white/10 rounded-full px-3 py-1">{totalPhotos}写真枠</div>
                    </div>
                    <button
                      onClick={handlePrint}
                      className="rounded-2xl bg-sky-600 px-4 py-3 text-sm font-bold shadow"
                    >
                      印刷 / PDF保存
                    </button>
                  </div>
                </div>
              </div>

              <div className="px-3 py-3 space-y-3">
                <div className="mobile-card">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-lg font-black tracking-tight">案件情報</h2>
                    <button
                      onClick={exportJson}
                      className="rounded-xl bg-slate-100 px-3 py-2 text-sm font-bold text-slate-700"
                    >
                      保存
                    </button>
                  </div>

                  <div className="space-y-4">
                    <div>
                      <label className="mobile-label">工事名称</label>
                      <textarea
                        value={project.title}
                        onChange={(e) => updateProjectField("title", e.target.value)}
                        rows="3"
                        className="mobile-textarea"
                        placeholder="案件名を入力"
                      />
                    </div>

                    <div>
                      <label className="mobile-label">施工場所 / 現場住所</label>
                      <input
                        value={project.location}
                        onChange={(e) => updateProjectField("location", e.target.value)}
                        className="mobile-input"
                      />
                    </div>

                    <div>
                      <label className="mobile-label">工期</label>
                      <input
                        value={project.period}
                        onChange={(e) => updateProjectField("period", e.target.value)}
                        className="mobile-input"
                      />
                    </div>

                    <div>
                      <label className="mobile-label">施工業者</label>
                      <input
                        value={project.contractor}
                        onChange={(e) => updateProjectField("contractor", e.target.value)}
                        className="mobile-input"
                      />
                    </div>

                    <div>
                      <label className="mobile-label">担当者名</label>
                      <input
                        value={project.representative}
                        onChange={(e) => updateProjectField("representative", e.target.value)}
                        className="mobile-input"
                      />
                    </div>

                    <div>
                      <label className="mobile-label">文書ID</label>
                      <input
                        value={project.serial}
                        onChange={(e) => updateProjectField("serial", e.target.value)}
                        className="mobile-input"
                      />
                    </div>
                  </div>
                </div>

                <div className="mobile-card">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-lg font-black tracking-tight">ページ管理</h2>
                    <div className="text-sm text-slate-500">{pages.length}ページ</div>
                  </div>

                  <div className="flex flex-wrap gap-2 mb-4">
                    {pages.map((page, index) => (
                      <button
                        key={page.id}
                        onClick={() => setActivePageIndex(index)}
                        className={`rounded-xl px-3 py-2 text-sm font-bold ${
                          index === activePageIndex
                            ? "bg-slate-900 text-white"
                            : "bg-slate-100 text-slate-700"
                        }`}
                      >
                        Page {index + 1}
                      </button>
                    ))}
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <button
                      onClick={addPage}
                      className="rounded-2xl bg-slate-900 text-white px-4 py-3 font-bold"
                    >
                      追加
                    </button>
                    <button
                      onClick={() => removePage(activePage.id)}
                      className="rounded-2xl bg-rose-50 text-rose-600 px-4 py-3 font-bold"
                    >
                      削除
                    </button>
                  </div>
                </div>

                <div className="mobile-card">
                  <div className="flex items-center justify-between mb-3">
                    <h2 className="text-lg font-black tracking-tight">台帳編集</h2>
                    <button
                      onClick={() => importRef.current && importRef.current.click()}
                      className="rounded-xl bg-slate-100 px-3 py-2 text-sm font-bold text-slate-700"
                    >
                      読込
                    </button>
                    <input
                      ref={importRef}
                      type="file"
                      accept=".json,application/json"
                      className="hidden-file-input"
                      onChange={importJson}
                    />
                  </div>

                  <div className="grid grid-cols-1 gap-4">
                    {activePage.photos.map((photo) => (
                      <div key={photo.id} className="rounded-2xl border border-slate-200 p-3">
                        <div className="aspect-[4/3] rounded-xl border border-slate-200 bg-slate-50 overflow-hidden relative">
                          {photo.src ? (
                            <img src={photo.src} alt="" className="w-full h-full object-cover block" />
                          ) : (
                            <div className="w-full h-full flex items-center justify-center text-slate-300 text-[10px] font-bold uppercase tracking-[0.14em]">
                              No Image
                            </div>
                          )}
                        </div>

                        <div className="mt-3 grid grid-cols-2 gap-2">
                          <label className="flex items-center justify-center rounded-xl bg-slate-900 text-white px-3 py-3 text-[13px] font-bold cursor-pointer">
                            画像をアップロード
                            <input
                              type="file"
                              accept="image/*"
                              className="hidden-file-input"
                              onChange={(e) => uploadPhoto(activePage.id, photo.id, e)}
                            />
                          </label>
                          <button
                            type="button"
                            onClick={() => clearPhotoImage(activePage.id, photo.id)}
                            className="rounded-xl bg-rose-50 text-rose-600 px-3 py-3 text-[13px] font-bold"
                          >
                            写真を削除
                          </button>
                        </div>

                        <div className="mt-3 space-y-3">
                          <div>
                            <label className="mobile-label">英字ステータス</label>
                            <select
                              value={photo.status}
                              onChange={(e) => updatePhoto(activePage.id, photo.id, "status", e.target.value)}
                              className="mobile-select"
                            >
                              <option value="">無記名</option>
                              <option value="before">BEFORE</option>
                              <option value="during">DURING</option>
                              <option value="after">AFTER</option>
                            </select>
                          </div>

                          <div>
                            <label className="mobile-label">日本語ステータス</label>
                            <select
                              value={photo.statusJp === "" ? "無記名" : photo.statusJp}
                              onChange={(e) => updatePhoto(activePage.id, photo.id, "statusJp", e.target.value)}
                              className="mobile-select"
                            >
                              <option value="無記名">無記名</option>
                              <option value="着工前">着工前</option>
                              <option value="施工中">施工中</option>
                              <option value="完了">完了</option>
                            </select>
                          </div>

                          <div>
                            <label className="mobile-label">写真番号</label>
                            <input
                              value={photo.photoId}
                              onChange={(e) => updatePhoto(activePage.id, photo.id, "photoId", e.target.value)}
                              className="mobile-input"
                            />
                          </div>

                          <div>
                            <label className="mobile-label">説明文</label>
                            <textarea
                              value={photo.caption}
                              onChange={(e) => updatePhoto(activePage.id, photo.id, "caption", e.target.value)}
                              placeholder="詳細説明を記入してください"
                              rows="4"
                              className="mobile-textarea"
                            />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="mobile-card">
                  <h2 className="text-lg font-black tracking-tight mb-3">スマホ確認用プレビュー</h2>
                  <p className="text-xs text-slate-500 mb-3">
                    スマホでは簡易プレビューのみ表示し、印刷 / PDF保存時のみA4本番レイアウトに切り替えます。
                  </p>

                  <div className="mobile-preview-sheet">
                    <div className="mobile-preview-page">
                      <div className="mobile-preview-title">Construction Photo Record</div>

                      <div className="mobile-preview-box">
                        <div className="sub">Project Name / 工事名称</div>
                        <div className="mobile-preview-project">
                          {project.title || "案件名を入力"}
                        </div>
                      </div>

                      <div className="grid grid-cols-1 gap-2 text-[12px] mb-4">
                        <div><span className="font-bold text-slate-500">施工場所：</span>{project.location}</div>
                        <div><span className="font-bold text-slate-500">工期：</span>{project.period}</div>
                        <div><span className="font-bold text-slate-500">施工業者：</span>{project.contractor}</div>
                        <div><span className="font-bold text-slate-500">担当者：</span>{project.representative}</div>
                      </div>

                      <div className="mobile-preview-grid">
                        {activePage.photos.map((photo) => (
                          <div key={photo.id} className="mobile-preview-photo">
                            <div className="mobile-preview-frame">
                              {photo.src ? (
                                <img src={photo.src} alt="" />
                              ) : (
                                <div className="text-slate-300 text-[10px] font-bold uppercase tracking-[0.14em]">
                                  No Image
                                </div>
                              )}
                            </div>

                            <div className="mobile-preview-status">{photo.status || ""}</div>
                            <div className="mobile-preview-status-jp">{photo.statusJp || ""}</div>
                            <div className="mobile-preview-id">{photo.photoId || " "}</div>
                            <div className="mobile-preview-caption">{photo.caption || ""}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="text-center text-xs text-slate-500 px-2">
                  GitHub Pages へ上書き後、スマホで更新が残る場合はブラウザの再読込を数回行ってください。
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
